<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Distributeur de boissons</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    margin: 0;
    padding: 0;
    text-align: center;
}

.container {
    max-width: 400px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.15);
}

h1 {
    color: #4b2e1f;
}

p {
    color: #555;
}

button {
    width: 90%;
    padding: 18px;
    margin: 12px;
    border: none;
    border-radius: 15px;
    font-size: 18px;
    cursor: pointer;
    background: #6f4e37;
    color: white;
}

button:hover {
    background: #4b2e1f;
}

.footer {
    margin-top: 25px;
    font-size: 14px;
    color: #777;
}
</style>

</head>

<body>

<div class="container">

<h1>☕ Bonjour !</h1>

<p>
Bienvenue sur votre distributeur de boissons chaudes.
<br>
Choisissez simplement votre boisson :
</p>


<button onclick="commande('Café')">
☕ Café
</button>


<button onclick="commande('Thé')">
🍵 Thé
</button>


<button onclick="commande('Lait')">
🥛 Lait
</button>


<p id="message"></p>


<div class="footer">
Boisson chaude • Sucre inclus • Merci de votre confiance
</div>

</div>


<script>

function commande(boisson) {

document.getElementById("message").innerHTML =
"Votre commande : <b>" + boisson + "</b><br>Préparation en cours... ☕";

}

</script>


</body>
</html>
