<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Café Express</title>

<style>

*{
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
margin:0;
background:#f3eee8;
color:#3b2418;
}

.header{
background:#4b2e1f;
color:white;
padding:25px;
text-align:center;
border-radius:0 0 25px 25px;
}

.container{
max-width:420px;
margin:25px auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.12);
}

h2{
text-align:center;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:15px;
background:#6b4226;
color:white;
font-size:18px;
}

.boisson{
padding:18px;
margin:12px 0;
background:#f8f4ef;
border-radius:15px;
font-size:20px;
cursor:pointer;
text-align:center;
}

.boisson.active{
background:#8b5e3c;
color:white;
}

.resume{
background:#f8f4ef;
padding:15px;
border-radius:15px;
line-height:1.8;
}

.etape{
padding:12px;
margin:10px 0;
border-radius:10px;
background:#eee;
}

.actif{
background:#8b5e3c;
color:white;
}

.cache{
display:none;
}

</style>

</head>


<body>


<div class="header">

<h1>☕ Café Express</h1>

<p>Votre boisson chaude en quelques secondes</p>

</div>


<div class="container">


<!-- IDENTIFICATION -->

<div class="card" id="pageIdentification">

<h2>👋 Bienvenue</h2>

<p>Veuillez vous identifier</p>

<input id="nom" placeholder="Votre nom">

<input id="prenom" placeholder="Votre prénom">


<button onclick="continuerIdentification()">
Continuer
</button>

</div>



<!-- CHOIX BOISSON -->

<div class="card cache" id="pageChoix">

<h2>Choisissez votre boisson</h2>


<div class="boisson" onclick="choisirBoisson('Café', this)">
☕ Café
</div>


<div class="boisson" onclick="choisirBoisson('Thé', this)">
🍵 Thé
</div>


<div class="boisson" onclick="choisirBoisson('Lait', this)">
🥛 Lait
</div>


<button onclick="afficherResume()">
Voir ma commande
</button>

</div>



<!-- RESUME -->

<div class="card cache" id="pageResume">

<h2>📋 Récapitulatif</h2>


<div class="resume" id="resumeCommande"></div>


<button onclick="validerCommande()">
✅ Confirmer la commande
</button>


<button onclick="modifierCommande()">
Modifier
</button>


</div>



<!-- SUIVI -->

<div class="card cache" id="pageSuivi">

<h2>☕ Suivi de commande</h2>

<h3 id="numeroCommande"></h3>


<div class="etape actif">
🟢 Commande reçue
</div>


<div class="etape" id="preparation">
🟡 Préparation en cours
</div>


<div class="etape" id="pret">
🟢 Boisson prête
</div>


<p id="messageFinal"></p>


</div>


</div>



<script>

let nomUtilisateur="";
let prenomUtilisateur="";
let boissonChoisie="";

let numeroCommande = Math.floor(Math.random()*900)+100;



function continuerIdentification(){

nomUtilisateur=document.getElementById("nom").value;
prenomUtilisateur=document.getElementById("prenom").value;


if(nomUtilisateur==="" || prenomUtilisateur===""){

alert("Veuillez remplir votre nom et votre prénom");

return;

}


document.getElementById("pageIdentification").classList.add("cache");

document.getElementById("pageChoix").classList.remove("cache");


}



function choisirBoisson(boisson, bouton){

boissonChoisie=boisson;


let boutons=document.querySelectorAll(".boisson");

boutons.forEach(function(b){

b.classList.remove("active");

});


bouton.classList.add("active");

}



function afficherResume(){


if(boissonChoisie===""){

alert("Veuillez choisir une boisson");

return;

}


document.getElementById("pageChoix").classList.add("cache");

document.getElementById("pageResume").classList.remove("cache");


document.getElementById("resumeCommande").innerHTML=

"👤 Client : "+nomUtilisateur+" "+prenomUtilisateur+
"<br>☕ Boisson : "+boissonChoisie+
"<br>🍬 Sucre : Inclus"+
"<br>🔥 Température : Chaude";


}



function modifierCommande(){

document.getElementById("pageResume").classList.add("cache");

document.getElementById("pageChoix").classList.remove("cache");

}



function validerCommande(){


document.getElementById("pageResume").classList.add("cache");

document.getElementById("pageSuivi").classList.remove("cache");


document.getElementById("numeroCommande").innerHTML=

"Commande #"+numeroCommande+" - "+boissonChoisie;



setTimeout(function(){

document.getElementById("preparation")
.classList.add("actif");

},3000);



setTimeout(function(){

document.getElementById("pret")
.classList.add("actif");

document.getElementById("messageFinal").innerHTML=

"✅ Votre boisson est prête, veuillez la récupérer.";

},7000);



}


</script>


</body>

</html>
