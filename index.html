<body>


<div class="header">

<h1>☕ Café Express</h1>

<p>Votre boisson chaude en quelques secondes</p>

<div class="container">


<!-- IDENTIFICATION -->

<div class="card" id="identification">

<h2>👋 Bienvenue</h2>

<p>Veuillez vous identifier</p>


<input id="nom" placeholder="Votre nom">

<input id="prenom" placeholder="Votre prénom">

</button>

<div class="card cache" id="choix">


<h2>Choisissez votre boisson</h2>


<div class="boisson" onclick="selection('Café',this)">

</div>


<div class="boisson" onclick="selection('Thé',this)">
🍵 Thé
</div>


<div class="boisson" onclick="selection('Lait',this)">
🥛 Lait
</div>


<button onclick="resume()">
Voir ma commande
</button>


</div>




<!-- RESUME -->

<div class="card cache" id="resume">


<h2>📋 Récapitulatif</h2>


<div class="resume" id="details"></div>


<button onclick="valider()">
✅ Confirmer la commande
</button>


<button onclick="retour()">
Modifier
</button>


</div>




<!-- SUIVI -->

<div class="card cache" id="suivi">


<h2>Commande en cours</h2>


<h3 id="numero"></h3>


<div class="etape actif">
🟢 Commande reçue
</div>


<div class="etape">

</div>


<div class="etape">

</div>


<p id="message"></p>


</div>

<script>


let nom="";
let prenom="";
let boisson="";
let numero=Math.floor(Math.random()*900)+100;



function continuer(){

nom=document.getElementById("nom").value;
prenom=document.getElementById("prenom").value;


if(nom=="" || prenom==""){

alert("Veuillez remplir vos informations");

return;

}


document.getElementById("identification").classList.add("cache");
document.getElementById("choix").classList.remove("cache");


}



function selection(b,e){

boisson=b;


document.querySelectorAll(".boisson")
.forEach(x=>x.classList.remove("active"));


e.classList.add("active");

}



function resume(){


if(boisson==""){

alert("Choisissez une boisson");

return;

}


document.getElementById("choix").classList.add("cache");

document.getElementById("resume").classList.remove("cache");


document.getElementById("details").innerHTML=

"👤 Client : "+nom+" "+prenom+
"<br>☕ Boisson : "+boisson+
"<br>🍬 Sucre : Inclus"+
"<br>🔥 Température : Chaude";


}



function retour(){

document.getElementById("resume").classList.add("cache");

document.getElementById("choix").classList.remove("cache");

}



function valider(){


document.getElementById("resume").classList.add("cache");

document.getElementById("suivi").classList.remove("cache");


document.getElementById("numero").innerHTML=
"Commande #"+numero+" - "+boisson;


setTimeout(()=>{

document.querySelectorAll(".etape")[1]
.classList.add("actif");

},3000);
